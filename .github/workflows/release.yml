name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create GitHub Release
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64, gajae-layofflabs-2]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --run

      # Some tests execute scripts/plugin-setup.mjs against the real
      # hooks/hooks.json and rewrite bare `node` to the absolute node binary
      # path of the runner (e.g. /opt/hostedtoolcache/node/.../bin/node). If we
      # let that mutated file ship, every end user inherits a node path that
      # does not exist on their machine. Restore the file to its committed
      # state before publishing. See issue #2348.
      - name: Restore hooks.json before publish
        run: git checkout -- hooks/hooks.json

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view wise@$VERSION version 2>/dev/null; then
            echo "::warning::Version $VERSION already published to npm, skipping publish"
          else
            set -o pipefail
            if npm publish --access public --provenance 2>&1 | tee npm-publish.log; then
              echo "Published to npm with provenance"
            elif grep -Eiq 'TLOG_CREATE_ENTRY_ERROR|tlog|rekor|transparency log' npm-publish.log; then
              echo "::warning::npm provenance publish failed due to Sigstore/Rekor transparency log outage; retrying without provenance"
              npm publish --access public
            else
              exit 1
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Prepare release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Use the pre-committed .github/release-body.md when available and non-empty.
          # Do NOT regenerate via release.ts here: the tag points to the release commit
          # so git log v{prev}..HEAD returns zero commits, producing an empty body.
          # The release script is meant to run *before* tagging and commit the result.
          if [ -s .github/release-body.md ]; then
            echo "Using committed release-body.md"
            cp .github/release-body.md release-notes.md
          else
            echo "Falling back to minimal release notes"
            echo "## wise v${VERSION}" > release-notes.md
            echo "" >> release-notes.md
            echo "### Install / Update" >> release-notes.md
            echo '```bash' >> release-notes.md
            echo "npm install -g wise@${VERSION}" >> release-notes.md
            echo '```' >> release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
